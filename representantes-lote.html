<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Painel do sócio administrador — SISLOG">
  <title>SISLOG — Painel do sócio</title>
  <link rel="stylesheet" href="styles.css?v=4">
  <link rel="stylesheet" href="minimals.css?v=3">
</head>
<body data-page="fornecedores">
  <div data-include="header"></div>

  <main class="mnl">
    <section class="page-section" style="padding-top: 30px;">
      <div class="container" style="max-width: 1040px;">
        <nav class="breadcrumb left">
          <a href="index.html">Página Inicial</a><span>•</span>
          <span class="current">Painel do sócio</span>
        </nav>

        <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px;">
          <div>
            <p class="mnl-overline">Sócio administrador</p>
            <h1 class="mnl-card-title" style="font-size:24px;">Painel de representantes</h1>
            <p class="mnl-card-subtitle">Gerencie os representantes autorizados a atuar em nome da empresa.</p>
          </div>
          <a class="mnl-btn outlined sm" href="email-inbox.html"><i class="fa-regular fa-envelope"></i> Caixa de e-mails</a>
        </div>

        <div class="painel-grid">
          <!-- Coluna esquerda: empresa -->
          <div class="mnl-card" id="empresaCard"></div>

          <!-- Coluna direita: cadastrar representantes + lista -->
          <div class="mnl-card">
            <div class="mnl-card-header">
              <h2 class="mnl-card-title">Cadastrar representante</h2>
              <p class="mnl-card-subtitle">O convite é enviado por e-mail e fica pendente até ser aceito.</p>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px;">
              <div class="mnl-field"><label class="mnl-label" for="nome">Nome</label>
                <input class="mnl-input" type="text" id="nome" placeholder="Nome do representante" autocomplete="off"></div>
              <div class="mnl-field"><label class="mnl-label" for="cpf">CPF</label>
                <input class="mnl-input" type="text" id="cpf" inputmode="numeric" placeholder="000.000.000-00" maxlength="14" autocomplete="off"></div>
              <div class="mnl-field" style="grid-column:1 / -1;"><label class="mnl-label" for="email">E-mail</label>
                <input class="mnl-input" type="email" id="email" placeholder="email@exemplo.com" autocomplete="off"></div>
            </div>
            <p class="mnl-muted" id="addMsg" style="min-height:16px; margin:8px 0 0; font-size:12.5px;"></p>
            <div class="mnl-btn-row">
              <button type="button" class="mnl-btn primary" id="addBtn"><i class="fa-solid fa-paper-plane"></i> Enviar convite</button>
            </div>

            <hr class="mnl-divider">

            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
              <span class="mnl-overline">Representantes</span>
              <span class="mnl-chip" id="repCount">0</span>
            </div>
            <div class="mnl-list" id="repList"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div data-include="footer" id="rodape"></div>
  <script src="app.js?v=2"></script>
  <script src="db.js?v=3"></script>
  <script src="painel.js?v=2"></script>
  <script>
    (function () {
      var DB = window.SislogDB, UI = window.SislogPainel;
      var nome = document.getElementById('nome');
      var cpf = document.getElementById('cpf');
      var email = document.getElementById('email');
      var addBtn = document.getElementById('addBtn');
      var addMsg = document.getElementById('addMsg');
      var repList = document.getElementById('repList');

      cpf.addEventListener('input', function () { cpf.value = DB.formatCpf(cpf.value); });

      function refresh() {
        UI.renderEmpresa(document.getElementById('empresaCard'));
        UI.renderRepresentantes(repList, {
          editable: true,
          onApprove: function (id) { var r = DB.getRepresentante(id); if (r) DB.aprovarRepresentantePorCpf(r.cpf); refresh(); },
          onRemove: function (id) { DB.removerRepresentante(id); refresh(); }
        });
      }

      addBtn.addEventListener('click', function () {
        addMsg.style.color = '';
        var res = DB.adicionarRepresentante({ nome: nome.value, cpf: cpf.value, email: email.value });
        if (!res.ok) { addMsg.textContent = res.erro; addMsg.style.color = 'var(--mnl-error)'; return; }
        nome.value = ''; cpf.value = ''; email.value = '';
        addMsg.textContent = '✅ Convite enviado para ' + res.rep.email + ' — aguardando aceite.';
        addMsg.style.color = 'var(--mnl-success-darker)';
        refresh();
      });

      refresh();
    })();
  </script>
</body>
</html>
