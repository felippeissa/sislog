<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello World — SISLOG</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #23407a, #081226 55%, #030712);
      color: #f8fafc;
    }

    main {
      width: min(90%, 680px);
      padding: 4rem 2rem;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.72);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 6rem);
      letter-spacing: -0.06em;
    }

    p {
      margin: 1rem 0 0;
      color: #93c5fd;
      font-size: 1.15rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello World!</h1>
    <p>SISLOG está no ar.</p>
  </main>
</body>
</html>
